<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day ❤️</title>
<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ffb6d9,#ffd6e7);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
text-align:center;
color:white;
}

.card{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(12px);
padding:45px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
max-width:650px;
position:relative;
z-index:2;
}

h1{font-size:42px;margin-bottom:10px}

p{font-size:20px;line-height:1.7}

button{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:30px;
font-size:18px;
background:#ff2e93;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff0f7b;
transform:scale(1.05);
}

#extra{
margin-top:25px;
font-size:24px;
display:none;
}

/* floating flowers */
.flower{
position:fixed;
top:-10vh;
font-size:22px;
animation:fall linear forwards;
opacity:0.9;
pointer-events:none;
}

@keyframes fall{
0%{
transform:translateY(-10vh) translateX(0) rotate(0deg);
opacity:0;
}
10%{opacity:1}
50%{
transform:translateY(50vh) translateX(var(--drift)) rotate(180deg);
}
100%{
transform:translateY(110vh) translateX(calc(var(--drift) * -1)) rotate(360deg);
opacity:0;
}
}
10%{opacity:1}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>
<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<div class="card">
<h1>Happy Women's Day 💐</h1>

<p>
To the most amazing girl in my life.<br><br>
You are strong, beautiful, and incredibly special to me.<br>
My world feels brighter because you are in it.<br><br>
Thank you for being you. ❤️
</p>

<button onclick="showMessage()">Click Here</button>

<p id="extra">You make my life happier every day. I love you so much 💖</p>
</div>

<script>
function showMessage(){
 document.getElementById('extra').style.display='block';
 launchConfetti();
}

/* random falling flowers */
const flowers=['🌸','🌺','💮','🌼','🌷'];

function createFlower(){
 const f=document.createElement('div');
 f.className='flower';
 f.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

 // random horizontal starting position
 f.style.left=Math.random()*100+'vw';

 // sideways drifting amount so they don't fall in a straight line
 const drift=(Math.random()*200-100)+'px';
 f.style.setProperty('--drift',drift);

 // random size
 f.style.fontSize=(18+Math.random()*22)+'px';

 // random falling speed
 f.style.animationDuration=(4+Math.random()*6)+'s';

 document.body.appendChild(f);

 setTimeout(()=>{f.remove();},10000);
}

setInterval(createFlower,300);

/* confetti when clicking */
function launchConfetti(){
 const icons=['💖','✨','💐','🌸','🌷','🌼'];

 for(let i=0;i<80;i++){
  setTimeout(()=>{

   const c=document.createElement('div');
   c.style.position='fixed';

   // random horizontal start
   c.style.left=Math.random()*100+'vw';

   // random starting height
   c.style.top='-20px';

   // random size
   c.style.fontSize=(18+Math.random()*20)+'px';

   // random flower
   c.innerHTML=icons[Math.floor(Math.random()*icons.length)];

   // random falling time
   const fallTime = 2 + Math.random()*3;

   c.style.transition='transform '+fallTime+'s linear';
   document.body.appendChild(c);

   setTimeout(()=>{
     c.style.transform='translateY(110vh) translateX('+(Math.random()*200-100)+'px)';
   },50);

   setTimeout(()=>{c.remove();},fallTime*1000);

  }, Math.random()*2000); // random delay
 }
}
</script>

</body>
</html>
